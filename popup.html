<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Analytics Scraper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      color: #333;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #333;
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
      color: #555;
    }

    input[type="text"],
    input[type="url"],
    textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="url"]:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      font-size: 12px;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    #scrapearBtn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      grid-column: 1 / -1;
    }

    #scrapearBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    #scrapearBtn:active {
      transform: translateY(0);
    }

    #enviarBtn {
      background: #4caf50;
      color: white;
    }

    #enviarBtn:hover:not(:disabled) {
      background: #45a049;
      transform: translateY(-2px);
    }

    #limpiarBtn {
      background: #f44336;
      color: white;
    }

    #limpiarBtn:hover {
      background: #da190b;
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .status.success {
      background: #c8e6c9;
      color: #2e7d32;
      display: block;
    }

    .status.error {
      background: #ffcdd2;
      color: #c62828;
      display: block;
    }

    .status.info {
      background: #bbdefb;
      color: #1565c0;
      display: block;
    }

    .info-text {
      font-size: 12px;
      color: #999;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 TikTok Analytics Scraper</h1>

    <div class="form-group">
      <label for="webhookUrl">URL del Webhook (n8n):</label>
      <input
        type="url"
        id="webhookUrl"
        placeholder="https://tu-webhook.n8n.cloud/..."
        required
      >
    </div>

    <div class="form-group">
      <label for="scrapedData">Datos Scrapeados:</label>
      <textarea
        id="scrapedData"
        placeholder="Los datos aparecerán aquí..."
        readonly
      ></textarea>
    </div>

    <div class="button-group">
      <button id="scrapearBtn">🔍 Scrapear Datos</button>
      <button id="enviarBtn" disabled>📤 Enviar a n8n</button>
      <button id="limpiarBtn">🗑️ Limpiar</button>
    </div>

    <div class="status" id="status"></div>
    <p class="info-text">Asegúrate de estar en la página de analytics del video</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
